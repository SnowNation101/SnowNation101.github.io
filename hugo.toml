[params.homeInfoParams]
Title = "PaperMod's Demo"
Content = """
👋 Welcome to the demo page of Hugo's theme PaperMod!

- **PaperMod** is designed to be a clean and simple but fast and responsive theme with a useful feature-set that enhances UX.

- Feel free to show your support by giving us a star 🌟 on GitHub and sharing with your friends and social media.

- PaperMod is based on the theme [Paper](https://github.com/nanxiaobei/hugo-paper/tree/4330c8b12aa48bfdecbcad6ad66145f679a430b3).
"""

